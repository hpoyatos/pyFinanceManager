{% extends "base.html" %}

{% block title %}Editar Conta | pyFinanceManager{% endblock %}
{% block page_title %}Editar Conta{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 600px; margin: 0 auto;">
    <form action="{{ url_for('accounts.edit_conta', id=conta.id) }}" method="POST">
        <div class="form-group">
            <label>Nome da Conta</label>
            <input type="text" name="nome" class="form-control" value="{{ conta.nome }}" required>
        </div>
        <div class="form-group">
            <label>Instituição Bancária</label>
            <select name="instituicao_id" class="form-control" required>
                {% for inst in instituicoes %}
                <option value="{{ inst.id }}" {% if inst.id == conta.instituicao_id %}selected{% endif %}>{{ inst.nome }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Tipo</label>
            <select name="tipo" class="form-control" required>
                <option value="banco" {% if conta.tipo == 'banco' %}selected{% endif %}>Conta Bancária</option>
                <option value="cartao" {% if conta.tipo == 'cartao' %}selected{% endif %}>Cartão de Crédito</option>
            </select>
        </div>
        <div class="form-group">
            <label>Saldo Inicial (R$)</label>
            <input type="number" step="0.01" name="saldo_inicial" class="form-control" value="{{ conta.saldo_inicial }}">
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <a href="{{ url_for('accounts.index') }}" class="btn" style="background: #ccc; color: #333; text-decoration: none; text-align:center; flex:1;">Cancelar</a>
            <button type="submit" class="btn btn-primary" style="flex:2;"><i class="fa-solid fa-save"></i> Atualizar Conta</button>
        </div>
    </form>
</div>
{% endblock %}
